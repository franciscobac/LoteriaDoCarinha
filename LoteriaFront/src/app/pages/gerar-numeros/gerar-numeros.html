<div class="card">
  <div class="card-header bg-primary text-white">
    <h4 class="mb-0">Gerar Números para Aposta</h4>
  </div>
  <div class="card-body">
    <div class="row">
      <div class="col-md-6">
        <label class="form-label">Loteria</label>
        <select class="form-select" [(ngModel)]="tipoLoteriaId" name="tipoLoteriaId">
          <option [value]="1">Mega-Sena (6 números - 1 a 60)</option>
          <option [value]="2">Lotofácil (15 números - 1 a 25)</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Observação (opcional)</label>
        <input type="text" class="form-control" [(ngModel)]="observacao" name="observacao" placeholder="Ex: Aposta para concurso 3000">
      </div>
    </div>
    <div class="mt-3">
      <button class="btn btn-primary" (click)="gerar()" [disabled]="carregando">
        {{ carregando ? 'Gerando...' : 'Gerar Números' }}
      </button>
    </div>

    <!-- Exibir loading -->
    <div *ngIf="carregando" class="text-center mt-4">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Gerando...</span>
      </div>
      <p class="mt-2">Gerando números aleatórios...</p>
    </div>

    <!-- Exibir erro -->
    <div *ngIf="erro && !carregando" class="alert alert-danger mt-4">
      {{ erro }}
    </div>

    <!-- Exibir números gerados -->
    <div *ngIf="numerosGerados && !carregando && !erro" class="mt-4">
      <hr>
      <h5 class="text-success">✅ Números Gerados com Sucesso!</h5>
      <p class="text-muted">Loteria: {{ tipoLoteriaId === 1 ? 'Mega-Sena' : 'Lotofácil' }}</p>
      
      <div class="d-flex flex-wrap gap-2 mb-3">
        <div *ngFor="let num of numerosGerados" 
             class="bg-success text-white p-3 rounded-circle d-inline-flex align-items-center justify-content-center fw-bold fs-5"
             style="width: 55px; height: 55px;">
          {{ num | number:'2.0' }}
        </div>
      </div>
      
      <div *ngIf="observacao" class="alert alert-info mt-2">
        <strong>Observação:</strong> {{ observacao }}
      </div>
      
      <div class="alert alert-success mt-2">
        📝 Estes números foram salvos no seu histórico!
      </div>
    </div>
  </div>
</div>
