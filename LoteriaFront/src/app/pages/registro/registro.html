<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-header bg-success text-white">
        <h4 class="mb-0">{{ cadastroPendente ? 'Confirmar Cadastro' : 'Registro' }}</h4>
      </div>
      <div class="card-body">
        <div *ngIf="erro" class="alert alert-danger">{{ erro }}</div>
        <div *ngIf="mensagem" class="alert alert-success">{{ mensagem }}</div>

        <form *ngIf="!cadastroPendente" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" [(ngModel)]="nome" name="nome" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" [(ngModel)]="senha" name="senha" required>
          </div>
          <button type="submit" class="btn btn-success w-100" [disabled]="carregando">
            {{ carregando ? 'Registrando...' : 'Registrar' }}
          </button>
        </form>

        <form *ngIf="cadastroPendente" (ngSubmit)="confirmarCodigo()">
          <div class="alert alert-info">
            Enviamos um código de confirmação para <strong>{{ email }}</strong>. Só liberamos o acesso após essa validação.
          </div>
          <div class="mb-3">
            <label class="form-label">Código de confirmação</label>
            <input type="text" class="form-control" [(ngModel)]="codigo" name="codigo" maxlength="6" required>
          </div>
          <button type="submit" class="btn btn-success w-100" [disabled]="carregando">
            {{ carregando ? 'Confirmando...' : 'Confirmar cadastro' }}
          </button>
          <button type="button" class="btn btn-outline-secondary w-100 mt-2" [disabled]="carregando" (click)="reenviarCodigo()">
            Reenviar código
          </button>
        </form>

        <div class="mt-3 text-center">
          <a routerLink="/login">Já tem conta? Faça login</a>
        </div>
      </div>
    </div>
  </div>
</div>
