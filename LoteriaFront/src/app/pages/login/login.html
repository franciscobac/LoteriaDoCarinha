<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">Login</h4>
      </div>
      <div class="card-body">
        <div *ngIf="erro" class="alert alert-danger alert-dismissible fade show" role="alert">
          {{ erro }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div *ngIf="mensagem" class="alert alert-success">{{ mensagem }}</div>
        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="email" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" [(ngModel)]="senha" name="senha" required>
          </div>
          <button type="submit" class="btn btn-primary w-100" [disabled]="carregando">
            {{ carregando ? 'Entrando...' : 'Entrar' }}
          </button>
        </form>
        <div *ngIf="pendenteConfirmacao" class="mt-3 border-top pt-3">
          <p class="small text-muted mb-2">Seu cadastro ainda não foi confirmado. Informe o código enviado por e-mail para liberar o acesso.</p>
          <div class="mb-3">
            <label class="form-label">Código de confirmação</label>
            <input type="text" class="form-control" [(ngModel)]="codigo" name="codigoConfirmacao" maxlength="6">
          </div>
          <button type="button" class="btn btn-outline-primary w-100" [disabled]="carregando" (click)="confirmarCadastro()">
            Confirmar cadastro
          </button>
          <button type="button" class="btn btn-link w-100 mt-2" [disabled]="carregando" (click)="reenviarCodigo()">
            Reenviar código
          </button>
        </div>
        <div class="mt-3 text-center">
          <a routerLink="/registro">Não tem conta? Registre-se</a>
        </div>
      </div>
    </div>
  </div>
</div>
